<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
     <link rel="stylesheet" href="assents/css/styles4.css">
  </head>
  <body>
    <!--o oraculo matrix-->
    <div class="box">
      <button id="btnConselho">Pedir Conselho</button>
      <p id="textoConselho"></p>
    </div>

    <!-- gera imagen de cachorro-->
    <div class="box"></div>
        <button id="btnCachorro">Gerar Imagem de Cachorro</button>
        <img id="Fotopet" src="" alt="Foto do Pet" style="display:none; width: 300px; height: auto; margin-top: 10px;">

    <!-- verificador de cep-->
    <div class="box"></div>
        <input type="text" id="cepInput" placeholder="Digite o CEP" />
        <button id="btnCep">Consultar CEP</button>
        <div id="cepResultado"></div>

    <div class="box"></div>
<script>// Código para o botão de conselho
  const btnconselho = document.getElementById('btnConselho');
  const textoConselho = document.getElementById('textoConselho');

  btnconselho.addEventListener('click', () => {
    // Feedback visual imediato para o usuário
    textoConselho.textContent = "Consultando a Matrix...";

    fetch('https://api.adviceslip.com/advice')
      .then(response => {
        if (!response.ok) throw new Error('Erro na rede');
        return response.json();
      })
      .then(data => {
        // Exibindo o conselho
        textoConselho.textContent = `"${data.slip.advice}"`;
      })
      .catch(error => {
        console.error('Erro ao obter conselho:', error);
        textoConselho.textContent = 'A conexão com o Oráculo falhou. Tente novamente.';
      });
  }); // O fechamento que faltava estava aqui!
</script>


<script>
  document.getElementById("btnCachorro").addEventListener("click", () => {
    const img = document.getElementById("Fotopet");
    
    fetch("https://dog.ceo/api/breeds/image/random")
      .then(res => {
        if (!res.ok) throw new Error("Erro ao buscar imagem kkkkkkk");
        return res.json(); // retorna a resposta como JSON
      })
      .then(dados => {
        // Atualiza a imagem com base do json recebido
        img.src = dados.message;
        
        // Garante que a imagem só apareça quando terminar de carregar
        img.onload = () => {
          img.style.display = "block";
        };
      })
      .catch(err => console.error(" Algo deu errado:", err));
  });
</script>

<script> //buscar cep
  document.getElementById("btnCep").addEventListener("click", () => {
    const cep = document.getElementById("cepInput").value.trim();
    const resultadoDiv = document.getElementById("cepResultado");

    if (!cep) {
      resultadoDiv.textContent = "Por favor, insira um CEP.";
      return;
    }

    resultadoDiv.textContent = "Consultando o CEP...";

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
      .then(res => {
        if (!res.ok) throw new Error("Erro ao buscar CEP");
        return res.json();
      })
      .then(dados => {
        if (dados.erro) {
          resultadoDiv.textContent = "CEP não encontrado.";
          return;
        }
        // Exibe os dados do endereço
        resultadoDiv.innerHTML = `
          <p><strong>CEP:</strong> ${dados.cep}</p>
          <p><strong>Logradouro:</strong> ${dados.logradouro}</p>
          <p><strong>Bairro:</strong> ${dados.bairro}</p>
          <p><strong>Cidade:</strong> ${dados.localidade}</p>
          <p><strong>Estado:</strong> ${dados.uf}</p>
        `;
      })
      .catch(err => {
        console.error("Erro ao consultar CEP:", err);
        resultadoDiv.textContent = "Ocorreu um erro ao consultar o CEP. Tente novamente.";
      });
  });


</script>







  </body>
</html>
