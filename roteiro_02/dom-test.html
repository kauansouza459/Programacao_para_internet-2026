<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Apps JS</title>
<link rel="stylesheet" href="assents/css/styles3.css">
</head>

<body>

<!-- TEXTO -->
<div class="card">
    <h1 id="titulo">Olá Mundo!</h1>
    <button id="btnTexto">Clique Aqui</button>
</div>

<!-- LISTA -->
<div class="card">
    <h2>Lista</h2>
    <ul id="minhaLista"></ul>
    <button id="add">Adicionar Item</button>
</div>

<!-- CONTADOR -->
<div class="card">
    <h2>Contador</h2>
    <h2 id="contador">0</h2>
    <button id="btnSoma">Contar +1</button>
</div>

<!-- ÁUDIO -->
<div class="card">
    <h2>Áudio</h2>
    <button id="tocar">Tocar som</button>
</div>

<!-- LÂMPADA -->
<div class="card">
    <h2>Lâmpada</h2>
    <img id="lampada" src="assents/img/lampada_desligada.png" width="100">
    <br>
    <button id="btnInterruptor">Ligar/Desligar</button>
</div>

<!-- JOGO DO CHUTE -->
<div class="card">
    <h2>Adivinhe o número</h2>
    <input type="number" id="palpite">
    <button id="btnChutar">Chutar!</button>
    <p id="feedback"></p>
</div>

<!-- BOTÃO FUGITIVO -->
<div class="card">
    <h2>Botão fugitivo 😈</h2>
    <div class="area-fugitivo" id="area">
        <button id="fugitivo" style="position:absolute;">
            Pegue-me!
        </button>
    </div>
    <p>Erros: <span id="contadorErros">0</span></p>
</div>

<!-- JOKENPO -->
<div class="card">
    <h2>Jokenpo</h2>
    <button onclick="jogar('pedra')">Pedra</button>
    <button onclick="jogar('papel')">Papel</button>
    <button onclick="jogar('tesoura')">Tesoura</button>
    <p id="resultado"></p>

    <p>Acertos: <span id="acertos">0</span></p>
    <p>Erros: <span id="erros">0</span></p>
    <p>Jogadas: <span id="jogadas">0</span></p>
</div>

<script>
// TEXTO
document.getElementById("btnTexto").onclick = () => {
    titulo.innerText = "JavaScript funcionando!";
};

// LISTA
document.getElementById("add").onclick = () => {
    const li = document.createElement("li");
    li.innerText = "Novo item";
    document.getElementById("minhaLista").appendChild(li);
};

// CONTADOR
let valor = 0;
btnSoma.onclick = () => {
    valor++;
    contador.innerText = valor;
};

// ÁUDIO
const audio = new Audio("assents/img/audio.mp3");
tocar.onclick = () => {
    audio.currentTime = 0;
    audio.play();
};

// LÂMPADA
let acesa = false;
btnInterruptor.onclick = () => {
    acesa = !acesa;
    lampada.src = acesa
        ? "assents/img/lampada_ligada.png"
        : "assents/img/lampada_desligada.png";
};

// CHUTE
const segredo = Math.floor(Math.random() * 11);
btnChutar.onclick = () => {
    const chute = Number(palpite.value);
    feedback.innerText =
        chute === segredo ? "Acertou!" :
        chute > segredo ? "Muito alto!" : "Muito baixo!";
};

// FUGITIVO (AGORA DENTRO DA DIV)
let erros = 0;
fugitivo.onmouseover = () => {
    erros++;
    contadorErros.innerText = erros;

    const area = document.getElementById("area");
    const x = Math.random() * (area.clientWidth - 80);
    const y = Math.random() * (area.clientHeight - 40);

    fugitivo.style.left = x + "px";
    fugitivo.style.top = y + "px";
};

// JOKENPO
const opcoes = ['pedra','papel','tesoura'];

function jogar(player) {
    const pc = opcoes[Math.floor(Math.random()*3)];

    jogadas.innerText++;

    if(player === pc){
        resultado.innerText = "Empate!";
    }
    else if(
        (player==='pedra' && pc==='tesoura') ||
        (player==='papel' && pc==='pedra') ||
        (player==='tesoura' && pc==='papel')
    ){
        resultado.innerText = "Ganhou!";
        acertos.innerText++;
    } else {
        resultado.innerText = "Perdeu!";
        erros.innerText++;
    }
}
</script>

</body>
</html>
