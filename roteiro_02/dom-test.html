<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assents/css/styles3.css">
    <title>Document</title>
</head>

<body>
    <h1 id="titulo">Olá Mundo!</h1>

    <button id="btnTexto">Clique Aqui</button>

    <ul id="minhaLista"></ul>

    <button id="add">Adicionar Item</button>

    <h2>quantos cliques em 10 segundos</h2>
    <h2 id="contador">0</h2>
    <button id="btnSoma">Contar +1</button>

    <button id="tocar">Tocar som</button>

    <img id="lampada" src="assents/img/lampada_desligada.png" style="width:100px">
    <button id="btnInterruptor">Ligar/Desligar</button>

    <input type="number" id="palpite" placeholder="0 a 10">
    <button id="btnChutar">Chutar!</button>
    <p id="feedback"></p>

    <p>Erros: <span id="contadorErros">0</span></p>
    <button id="fugitivo" style="position: absolute; left: 50%; top: 50%;">
        pegume se for capaz
    </button>

    <script>
        // ===================== ÁUDIO =====================
        const botaoAudio = document.getElementById("tocar");

        const audio = new Audio(
            "assents/img/Rick Astley - Never Gonna Give You Up (Official Video) (4K Remaster) [dQw4w9WgXcQ].mp3"
        );

        botaoAudio.addEventListener("click", () => {
            audio.currentTime = 0;
            audio.play();
        });

        // ===================== TEXTO =====================
        const titulo = document.getElementById("titulo");

        document.getElementById("btnTexto").addEventListener("click", () => {
            titulo.innerText = "JavaScript funcionando!";
            titulo.style.color = "black";
        });

        // ===================== LISTA =====================
        const lista = document.getElementById("minhaLista");
        const botaoAdd = document.getElementById("add");

        botaoAdd.addEventListener("click", () => {
            const li = document.createElement("li");
            const botao = document.createElement("button");

            botao.innerText = "botão criado dinamicamente";

            botao.addEventListener("click", () => {
                alert("Você clicou no botão criado dinamicamente!");
            });

            li.appendChild(botao);
            lista.appendChild(li);
        });

        // ===================== CONTADOR =====================
        let valor = 0;
        const display = document.getElementById("contador");

        document.getElementById("btnSoma").addEventListener("click", () => {
            valor++;
            display.innerText = valor;
        });

        // ===================== LÂMPADA =====================
        const img = document.getElementById("lampada");
        let acesa = false;

        document.getElementById("btnInterruptor").addEventListener("click", () => {
            acesa = !acesa;
            img.src = acesa
                ? "assents/img/lampada_ligada.png"
                : "assents/img/lampada_desligada.png";
        });

        // ===================== JOGO DO CHUTE =====================
        const campo = document.getElementById("palpite");
        const texto = document.getElementById("feedback");
        const segredo = Math.floor(Math.random() * 11);

        document.getElementById("btnChutar").addEventListener("click", () => {
            const chute = Number(campo.value);

            if (chute === segredo) {
                texto.innerText = "Parabéns! Você acertou!";
                texto.style.color = "green";
            } else {
                texto.innerText = chute > segredo ? "Muito alto!" : "Muito baixo!";
                texto.style.color = "red";
            }
        });

        // ===================== BOTÃO FUGITIVO =====================
        const btn = document.getElementById("fugitivo");
        const placar = document.getElementById("contadorErros");
        let erros = 0;

        btn.addEventListener("mouseover", () => {
            erros++;
            placar.innerText = erros;

            // Mudar posição aleatoriamente
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);

            btn.style.left = `${x}px`;
            btn.style.top = `${y}px`;
        });
    </script>
</body>
</html>
